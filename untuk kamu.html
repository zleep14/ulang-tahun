<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ulang Tahun 3D - Bola Foto & Musik</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background-color: #05050f; font-family: 'Arial', sans-serif; }

    #start-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, #0f0920 0%, #05050f 100%);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 1000; color: #fff; transition: opacity 1s ease;
    }
    #start-screen.hidden { opacity: 0; pointer-events: none; }
    #start-screen h1 { font-size: 4em; text-shadow: 0 0 40px #88aaff, 0 0 80px #4466ff; margin-bottom: 10px; letter-spacing: 6px; }
    #start-screen p { font-size: 1.2em; opacity: 0.7; margin-bottom: 40px; letter-spacing: 2px; }
    #start-btn {
      padding: 18px 50px; font-size: 1.8em; font-weight: bold; color: #fff;
      background: linear-gradient(135deg, #4466ff, #8822ff); border: none; border-radius: 50px;
      cursor: pointer; box-shadow: 0 0 30px rgba(68,102,255,0.6);
      transition: transform 0.3s, box-shadow 0.3s; letter-spacing: 2px;
    }
    #start-btn:hover { transform: scale(1.05); box-shadow: 0 0 50px rgba(68,102,255,0.9); }
    #start-btn:active { transform: scale(0.95); }

    #loading-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #05050f; display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 999; color: #fff; transition: opacity 1s ease; opacity: 0; pointer-events: none;
    }
    #loading-screen.show { opacity: 1; pointer-events: auto; }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 60px; height: 60px; border: 6px solid rgba(255,255,255,0.1);
      border-top: 6px solid #88aaff; border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { margin-top: 20px; font-size: 1.2em; letter-spacing: 2px; text-shadow: 0 0 10px #88aaff; }
    #loading-progress { margin-top: 8px; font-size: 0.9em; color: rgba(255,255,255,0.6); }

    #fade-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #05050f; z-index: 5; pointer-events: none;
      transition: opacity 3s ease; opacity: 1;
    }
    #fade-overlay.fade-out { opacity: 0; }

    #judul {
      position: absolute; top: 20px; left: 0; width: 100%; text-align: center;
      color: #fff; font-size: 2.4em; font-weight: bold;
      text-shadow: 0 0 30px #88aaff, 0 0 60px #4466ff;
      pointer-events: none; z-index: 10; letter-spacing: 4px;
      opacity: 0; transition: opacity 2s ease 1.5s;
    }
    #judul.show { opacity: 1; }
    #info {
      position: absolute; bottom: 30px; left: 0; width: 100%; text-align: center;
      color: rgba(255,255,255,0.4); font-size: 0.9em; pointer-events: none; z-index: 10;
      opacity: 0; transition: opacity 2s ease 2s;
    }
    #info.show { opacity: 1; }

    .outro-text {
      position: fixed; bottom: 10%; left: 50%; transform: translateX(-50%);
      color: #fff; font-size: 2.8em; font-weight: bold; text-align: center;
      text-shadow: 0 0 30px #88aaff, 0 0 60px #4466ff, 0 0 90px #8822ff;
      z-index: 100; pointer-events: none; white-space: normal;
      animation: floatUp 4.5s ease-out forwards; max-width: 90vw; padding: 0 20px;
    }
    @keyframes floatUp {
      0% { opacity: 0; transform: translateX(-50%) translateY(80px) scale(0.8); }
      15% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
      75% { opacity: 1; transform: translateX(-50%) translateY(-30px) scale(1); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-150px) scale(1.1); }
    }

    /* Musik kontrol (opsional) */
    #music-control {
      position: fixed; bottom: 80px; right: 20px; z-index: 10;
      background: rgba(255,255,255,0.1); border: none;
      color: #fff; font-size: 1.5em; padding: 10px 15px;
      border-radius: 50px; cursor: pointer;
      backdrop-filter: blur(5px);
      transition: background 0.3s;
    }
    #music-control:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>

  <!-- START SCREEN -->
  <div id="start-screen">
    <h1>Kejutan Semesta</h1>
    <p>Kejutan spesial untuk kamu</p>
    <button id="start-btn"> Mulai</button>
  </div>

  <!-- LOADING SCREEN -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <div id="loading-text"> Menyiapkan Galaksi...</div>
    <div id="loading-progress">0%</div>
  </div>

  <!-- FADE OVERLAY -->
  <div id="fade-overlay"></div>

  <!-- JUDUL & INFO -->
  <div id="judul">🎉 Happy Birthday Dawn Star! 🎉</div>
  <div id="info">Klik foto untuk membaca pesan buat kamu</div>

  <!-- 🎵 MUSIK LATAR -->
  <!-- Ganti src dengan file musik Anda sendiri jika mau -->
  <audio id="bg-music" loop preload="auto">
    <source src="lagu.mp3" type="audio/mpeg">
    <!-- fallback jika format tidak didukung -->
    Musik latar tidak dapat diputar. 
  </audio>

  <!-- Tombol kontrol musik (opsional) -->
  <button id="music-control">🔊</button>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ============================================================
    // 🔥 KONFIGURASI SUMBER FOTO 🔥
    // ============================================================
    const USE_LOCAL = true;          // true = pakai folder 'foto'
    const jumlahFotoLokal = 40;      // jumlah file gambar (1.jpg s/d 10.jpg)

    const fotoUrls = [
      // isi dengan link online jika USE_LOCAL = false
    ];
    // ============================================================

    // DAFTAR CERITA
    const ceritaArray = [
      "Selamat ulang tahun! Semoga hari ini penuh tawa.",
      "Teruslah bersinar seperti bintang di langit malam.",
      "Setiap tahun adalah lembaran baru untuk berkarya.",
      "Kebahagiaan adalah perjalanan, bukan tujuan. Nikmati!",
      "Kamu luar biasa, jangan pernah ragu pada dirimu.",
      "Impian besar dimulai dari langkah kecil hari ini.",
      "Tersenyumlah, karena hari ini adalah hadiah untukmu.",
      "Jadilah versi terbaik dari dirimu sendiri.",
      "Cinta dan kebaikan akan selalu mengelilingimu.",
      "Rayakan setiap momen, karena hidup itu indah.",
      "Semoga semua harapanmu menjadi nyata.",
      "Kamu adalah inspirasi bagi banyak orang.",
      "Hari ini adalah awal dari petualangan baru.",
      "Keberanianmu mengagumkan, teruslah melangkah.",
      "Kebersamaan adalah anugerah terindah.",
      "Jangan takut bermimpi, karena mimpi itu gratis.",
      "Setiap hari adalah kesempatan kedua.",
      "Kamu pantas mendapatkan semua kebahagiaan.",
      "Teruslah belajar dan tumbuh menjadi lebih baik.",
      "Hidup adalah kanvas, lukislah dengan warna-warna cerah.",
      "Kamu hebat, dan aku sangat bangga padamu.",
      "Jangan pernah berhenti tersenyum, senyummu berharga.",
      "Hari ini spesial karena kamu lahir di dunia.",
      "Terima kasih telah menjadi bagian dari ceritaku.",
      "Semoga cinta selalu menyertai langkahmu.",
      "Kamu adalah bintang di galaksi kehidupan.",
      "Setiap perjuanganmu sangat berarti.",
      "Tetaplah rendah hati, tapi bermimpilah setinggi langit.",
      "Kamu lebih kuat dari yang kamu kira.",
      "Kebahagiaan sejati dimulai dari dalam hati.",
      "Jangan bandingkan dirimu dengan orang lain.",
      "Kamu adalah karya seni yang tak ternilai.",
      "Hari ini, rayakan dengan penuh suka cita.",
      "Masa depan cerah menantimu.",
      "Kamu adalah hadiah bagi dunia ini.",
      "Cintai dirimu sendiri, karena kamu istimewa.",
      "Setiap napas adalah mukjizat.",
      "Teruslah berbagi kebaikan di mana pun.",
      "Kamu menginspirasi banyak orang di sekitarmu.",
      "Jangan pernah menyerah pada impianmu.",
      "Kamu adalah pelangi setelah hujan.",
      "Hidup ini singkat, jadi buatlah berarti.",
      "Kamu dicintai lebih dari yang kamu tahu.",
      "Tetaplah menjadi dirimu sendiri.",
      "Setiap hari adalah lembaran putih bersih.",
      "Kamu mampu melakukan hal-hal hebat.",
      "Jangan lupa bersyukur hari ini.",
      "Kamu adalah pahlawan bagi dirimu sendiri.",
      "Selamat ulang tahun, sayang! 🎂",
      "Semoga tahun ini penuh keajaiban!"
    ];

    // ------------------- ELEMEN DOM -------------------
    const startScreen = document.getElementById('start-screen');
    const startBtn = document.getElementById('start-btn');
    const loadingScreen = document.getElementById('loading-screen');
    const progressText = document.getElementById('loading-progress');
    const fadeOverlay = document.getElementById('fade-overlay');
    const judul = document.getElementById('judul');
    const info = document.getElementById('info');
    const audio = document.getElementById('bg-music');
    const musicBtn = document.getElementById('music-control');

    // ------------------- KONTROL MUSIK -------------------
    let musicPlaying = false;

    function toggleMusic() {
      if (musicPlaying) {
        audio.pause();
        musicBtn.textContent = '🔇';
      } else {
        audio.play().catch(e => console.warn('Musik tidak bisa diputar:', e));
        musicBtn.textContent = '🔊';
      }
      musicPlaying = !musicPlaying;
    }

    musicBtn.addEventListener('click', toggleMusic);

    // Set volume 50%
    audio.volume = 0.5;

    // ------------------- START APP -------------------
    let appInitialized = false;

    startBtn.addEventListener('click', () => {
      if (appInitialized) return;
      
      // Mulai musik
      audio.play().catch(e => console.warn('Musik tidak bisa diputar otomatis:', e));
      musicPlaying = true;
      musicBtn.textContent = '🔊';

      startScreen.classList.add('hidden');
      loadingScreen.classList.add('show');
      appInitialized = true;
      initApp();
    });

    // ------------------------------------------------------------
    // FUNGSI UTAMA
    // ------------------------------------------------------------
    function initApp() {
      let isPhotoMode = false;
      let selectedPhoto = null;
      let currentOutro = null;
      let isExpanding = false;
      let expandProgress = 0;
      const expandDuration = 2.2;

      // ---- TENTUKAN SUMBER FOTO ----
      let daftarUrl = [];
      if (USE_LOCAL) {
        for (let i = 1; i <= jumlahFotoLokal; i++) {
          daftarUrl.push(`foto/${i}.jpg`);
        }
        console.log(`📁 Menggunakan gambar lokal (${jumlahFotoLokal} file)`);
      } else {
        daftarUrl = fotoUrls;
        console.log(`🌐 Menggunakan gambar online (${daftarUrl.length} file)`);
      }

      const jumlahFoto = daftarUrl.length;
      if (jumlahFoto === 0) {
        console.error('⚠️ Tidak ada foto!');
        alert('Isi folder "foto" dengan gambar 1.jpg, 2.jpg, ... atau isi array fotoUrls.');
        return;
      }

      // ---- LOADING MANAGER ----
      const manager = new THREE.LoadingManager();
      let loadingComplete = false;

      manager.onProgress = (url, loaded, total) => {
        const percent = Math.round((loaded / total) * 100);
        progressText.textContent = `${percent}%`;
      };

      manager.onLoad = () => {
        loadingComplete = true;
        finishLoading();
      };

      manager.onError = (url) => {
        console.warn('⚠️ Gagal memuat:', url);
      };

      const timeoutId = setTimeout(() => {
        if (!loadingComplete) {
          console.warn('⏱️ Loading timeout, melanjutkan...');
          finishLoading();
        }
      }, 12000);

      function finishLoading() {
        clearTimeout(timeoutId);
        loadingScreen.classList.remove('show');
        loadingScreen.classList.add('hidden');
        setTimeout(() => { loadingScreen.style.display = 'none'; }, 1000);

        fadeOverlay.classList.add('fade-out');
        setTimeout(() => { fadeOverlay.style.display = 'none'; }, 3500);
        judul.classList.add('show');
        info.classList.add('show');

        isExpanding = true;
        expandProgress = 0;
        controls.enabled = true;
        console.log(`🎉 Bola foto mulai membesar! Jumlah foto: ${jumlahFoto}`);
      }

      // ---- TEXTURE LOADER ----
      const textureLoader = new THREE.TextureLoader(manager);
      textureLoader.crossOrigin = 'anonymous';

      // ---- SCENE, CAMERA, RENDERER ----
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x05050f);
      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 1.5, 6);
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      // ---- KONTROL ----
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.target.set(0, 0, 0);
      controls.minDistance = 2;
      controls.maxDistance = 12;
      controls.enabled = false;

      // ---- PENCAHAYAAN ----
      const ambient = new THREE.AmbientLight(0x404060);
      scene.add(ambient);

      const light1 = new THREE.DirectionalLight(0xffffff, 1.5);
      light1.position.set(2, 3, 4);
      scene.add(light1);

      const light2 = new THREE.DirectionalLight(0xffaa88, 0.6);
      light2.position.set(-3, -1, 2);
      scene.add(light2);

      const spotLight = new THREE.SpotLight(0x88ccff, 0.4);
      spotLight.angle = 0.6;
      spotLight.penumbra = 0.5;
      spotLight.distance = 20;
      spotLight.target.position.set(0, 0, 0);
      scene.add(spotLight.target);
      scene.add(spotLight);

      // ---- RASI BINTANG ----
      function createConstellation() {
        const group = new THREE.Group();
        const starPositions = [];
        const starCount = 80;
        for (let i = 0; i < starCount; i++) {
          const radius = 20 + Math.random() * 20;
          const theta = Math.random() * Math.PI * 2;
          const phi = Math.acos(2 * Math.random() - 1);
          const x = radius * Math.sin(phi) * Math.cos(theta);
          const y = radius * Math.sin(phi) * Math.sin(theta);
          const z = radius * Math.cos(phi);
          starPositions.push(new THREE.Vector3(x, y, z));
        }

        const pointsMat = new THREE.PointsMaterial({
          color: 0xaaccff,
          size: 0.4,
          transparent: true,
          opacity: 0.9,
          sizeAttenuation: true,
          blending: THREE.AdditiveBlending,
        });
        const geomPoints = new THREE.BufferGeometry();
        const posArray = starPositions.flatMap(p => [p.x, p.y, p.z]);
        geomPoints.setAttribute('position', new THREE.Float32BufferAttribute(posArray, 3));
        const points = new THREE.Points(geomPoints, pointsMat);
        group.add(points);

        const lineMat = new THREE.LineBasicMaterial({
          color: 0x88aaff,
          transparent: true,
          opacity: 0.2,
        });
        for (let i = 0; i < starPositions.length; i++) {
          for (let j = i + 1; j < starPositions.length; j++) {
            const dist = starPositions[i].distanceTo(starPositions[j]);
            if (dist < 5) {
              const geoLine = new THREE.BufferGeometry().setFromPoints([
                starPositions[i],
                starPositions[j]
              ]);
              const line = new THREE.Line(geoLine, lineMat);
              group.add(line);
            }
          }
        }
        return group;
      }

      const constellation = createConstellation();
      scene.add(constellation);

      // ---- BINTANG LATAR ----
      const starCountBg = 2000;
      const starGeometry = new THREE.BufferGeometry();
      const starPosBg = new Float32Array(starCountBg * 3);
      const starSizes = new Float32Array(starCountBg);
      const starData = [];
      for (let i = 0; i < starCountBg; i++) {
        starPosBg[i*3] = (Math.random() - 0.5) * 200;
        starPosBg[i*3+1] = (Math.random() - 0.5) * 200;
        starPosBg[i*3+2] = (Math.random() - 0.5) * 200;
        const size = 0.1 + Math.random() * 0.2;
        starSizes[i] = size;
        starData.push({ baseSize: size, speed: 0.5 + Math.random() * 2, phase: Math.random() * Math.PI * 2 });
      }
      starGeometry.setAttribute('position', new THREE.BufferAttribute(starPosBg, 3));
      starGeometry.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
      const starMaterial = new THREE.PointsMaterial({
        color: 0xffffff, size: 0.2, transparent: true, opacity: 0.8, sizeAttenuation: true
      });
      const starsBg = new THREE.Points(starGeometry, starMaterial);
      scene.add(starsBg);

      // ---- BINTANG JATUH ----
      const shootingStars = [];
      const MAX_SHOOTING = 6;
      const shootingMaterial = new THREE.PointsMaterial({
        color: 0x88ccff, size: 0.3, transparent: true, opacity: 0.8,
        blending: THREE.AdditiveBlending, depthWrite: false,
      });
      function spawnShootingStar() {
        if (shootingStars.length >= MAX_SHOOTING) return;
        const count = 20;
        const positions = new Float32Array(count * 3);
        const startX = (Math.random() - 0.5) * 40;
        const startY = 15 + Math.random() * 10;
        const startZ = (Math.random() - 0.5) * 30;
        const angle = Math.PI / 4 + (Math.random() - 0.5) * 0.5;
        const speed = 0.3 + Math.random() * 0.5;
        const length = 2 + Math.random() * 3;
        for (let i = 0; i < count; i++) {
          const t = i / count;
          positions[i*3] = startX - t * length * Math.cos(angle);
          positions[i*3+1] = startY - t * length * Math.sin(angle);
          positions[i*3+2] = startZ + (Math.random() - 0.5) * 0.5;
        }
        const geom = new THREE.BufferGeometry();
        geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const points = new THREE.Points(geom, shootingMaterial);
        scene.add(points);
        shootingStars.push({
          mesh: points, speed, angle, life: 0, maxLife: 1.5 + Math.random() * 1.5,
        });
      }
      for (let i = 0; i < 3; i++) setTimeout(() => spawnShootingStar(), i * 800);
      setInterval(() => { if (Math.random() < 0.5) spawnShootingStar(); }, 2000);

      // ---- GRUP FOTO ----
      const photoGroup = new THREE.Group();
      photoGroup.scale.set(0, 0, 0);
      scene.add(photoGroup);
      const positions = [];

      const radius = 2.8;

      // ---- PLACEHOLDER ----
      function createPlaceholderTexture(color = '#4466ff', text = '✨') {
        const canvas = document.createElement('canvas');
        canvas.width = 200;
        canvas.height = 200;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = color;
        ctx.fillRect(0, 0, 200, 200);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, 100, 100);
        return new THREE.CanvasTexture(canvas);
      }
      const placeholderTexture = createPlaceholderTexture('#4466ff', '✨');

      // ---- LOOPING BUAT FOTO ----
      for (let i = 0; i < jumlahFoto; i++) {
        const phi = Math.acos(1 - 2 * (i + 0.5) / jumlahFoto);
        const theta = Math.PI * (1 + Math.sqrt(5)) * i;
        const x = radius * Math.sin(phi) * Math.cos(theta);
        const y = radius * Math.sin(phi) * Math.sin(theta);
        const z = radius * Math.cos(phi);

        const geometry = new THREE.PlaneGeometry(0.6, 0.6);
        const url = daftarUrl[i];
        console.log(`📸 Memuat foto ${i+1}: ${url}`);

        const material = new THREE.MeshStandardMaterial({
          map: placeholderTexture,
          side: THREE.DoubleSide,
          roughness: 0.3,
          metalness: 0.1,
        });

        const photo = new THREE.Mesh(geometry, material);
        photo.position.set(x, y, z);
        photo.userData.isPhoto = true;
        photo.userData.story = ceritaArray[i % ceritaArray.length];
        photoGroup.add(photo);
        positions.push(new THREE.Vector3(x, y, z));

        textureLoader.load(
          url,
          (texture) => {
            console.log(`✅ Foto ${i+1} berhasil dimuat`);
            material.map = texture;
            material.needsUpdate = true;
          },
          undefined,
          (err) => {
            console.warn(`❌ Gagal memuat foto ${i+1}, pakai placeholder`);
          }
        );
      }

      // ---- GARIS PENGHUBUNG FOTO ----
      const lineMaterial = new THREE.LineBasicMaterial({ color: 0x88aaff, opacity: 0.15, transparent: true });
      for (let i = 0; i < positions.length; i++) {
        for (let j = i + 1; j < Math.min(i + 6, positions.length); j++) {
          const points = [positions[i], positions[j]];
          const geo = new THREE.BufferGeometry().setFromPoints(points);
          const line = new THREE.Line(geo, lineMaterial);
          photoGroup.add(line);
        }
      }

      // ---- RAYCASTER ----
      const raycaster = new THREE.Raycaster();
      const pointer = new THREE.Vector2();

      function resetSelected() {
        if (selectedPhoto) {
          selectedPhoto.scale.set(1, 1, 1);
          selectedPhoto.material.emissive = new THREE.Color(0x000000);
          selectedPhoto.material.emissiveIntensity = 0;
          selectedPhoto = null;
        }
      }
      function showOutroText(cerita) {
        if (currentOutro) { currentOutro.remove(); currentOutro = null; }
        const el = document.createElement('div');
        el.className = 'outro-text';
        el.textContent = `💫 ${cerita} 💫`;
        document.body.appendChild(el);
        currentOutro = el;
        setTimeout(() => {
          if (el.parentNode) { el.remove(); if (currentOutro === el) currentOutro = null; }
        }, 5000);
      }

      function onPhotoClick(event) {
        if (!isPhotoMode) return;
        const rect = renderer.domElement.getBoundingClientRect();
        let clientX, clientY;
        if (event.touches) {
          clientX = event.touches[0].clientX; clientY = event.touches[0].clientY;
          event.preventDefault();
        } else {
          clientX = event.clientX; clientY = event.clientY;
        }
        pointer.x = ((clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);
        const meshes = [];
        photoGroup.children.forEach(child => {
          if (child.isMesh && child.userData.isPhoto) meshes.push(child);
        });
        const intersects = raycaster.intersectObjects(meshes);
        if (intersects.length > 0) {
          const clicked = intersects[0].object;
          if (selectedPhoto === clicked) { resetSelected(); return; }
          resetSelected();
          clicked.scale.set(1.8, 1.8, 1.8);
          clicked.material.emissive = new THREE.Color(0xffaa00);
          clicked.material.emissiveIntensity = 0.3;
          selectedPhoto = clicked;
          const cerita = clicked.userData.story || 'Selamat Ulang Tahun! 🎂';
          showOutroText(cerita);
        } else {
          resetSelected();
        }
      }

      // ---- ANIMASI LOOP ----
      let time = 0;
      function animate() {
        requestAnimationFrame(animate);
        const delta = 0.016;
        time += delta;

        // Rotasi rasi bintang
        constellation.rotation.y += 0.0002;
        constellation.rotation.x += 0.0001;

        // Update cahaya mengikuti kamera
        light1.position.copy(camera.position).add(new THREE.Vector3(2, 1, 3));
        light1.lookAt(0, 0, 0);
        spotLight.position.copy(camera.position).add(new THREE.Vector3(0, 0, 1));
        spotLight.target.position.set(0, 0, 0);

        // Animasi membesar
        if (isExpanding) {
          expandProgress += delta / expandDuration;
          if (expandProgress >= 1) {
            expandProgress = 1;
            isExpanding = false;
            isPhotoMode = true;
            renderer.domElement.addEventListener('click', onPhotoClick);
            renderer.domElement.addEventListener('touchstart', onPhotoClick, { passive: false });
            console.log('✅ Bola foto muncul!');
          }
          const eased = 1 - Math.pow(1 - expandProgress, 5);
          const s = eased;
          photoGroup.scale.set(s, s, s);
          photoGroup.rotation.y += 0.008 * eased;
          photoGroup.rotation.x += 0.001 * eased;
        } else {
          photoGroup.rotation.y += 0.003;
          photoGroup.rotation.x += 0.0005;
        }

        // Foto lookAt
        if (isPhotoMode) {
          photoGroup.children.forEach(child => {
            if (child.isMesh && child.userData.isPhoto) {
              child.lookAt(camera.position);
            }
          });
        }

        // Bintang berkedip
        const sizes = starsBg.geometry.attributes.size.array;
        for (let i = 0; i < starCountBg; i++) {
          const data = starData[i];
          const flicker = 0.6 + 0.4 * Math.sin(time * data.speed + data.phase);
          sizes[i] = data.baseSize * flicker;
        }
        starsBg.geometry.attributes.size.needsUpdate = true;

        // Bintang jatuh
        for (let i = shootingStars.length - 1; i >= 0; i--) {
          const s = shootingStars[i];
          s.life += delta;
          if (s.life >= s.maxLife) {
            scene.remove(s.mesh);
            shootingStars.splice(i, 1);
            continue;
          }
          const pos = s.mesh.geometry.attributes.position.array;
          const step = s.speed * 0.03;
          for (let j = 0; j < pos.length; j += 3) {
            pos[j] -= step * Math.cos(s.angle);
            pos[j+1] -= step * Math.sin(s.angle);
          }
          s.mesh.geometry.attributes.position.needsUpdate = true;
          const opacity = 1 - (s.life / s.maxLife);
          s.mesh.material.opacity = opacity * 0.8;
        }

        controls.update();
        renderer.render(scene, camera);
      }
      animate();

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }
  </script>
</body>
